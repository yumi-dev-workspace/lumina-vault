<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Vault - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b1121; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-dark { background-color: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        .input-dark:focus { border-color: #3b82f6; outline: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8 relative">

    <div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 w-[90%] md:w-auto md:left-auto md:right-5 md:translate-x-0 px-6 py-4 rounded-lg shadow-2xl text-white font-bold transition-all duration-300 translate-y-20 opacity-0 z-50 flex items-center gap-3 pointer-events-none"></div>

    <div id="pantalla-login" class="fixed inset-0 z-40 bg-[#0b1121] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="glass-panel p-8 rounded-2xl w-full max-w-md shadow-2xl border-t-4 border-blue-500 text-center relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500/20 rounded-full blur-2xl"></div>
            
            <i class="fas fa-cube text-5xl text-blue-500 mb-4"></i>
            <h1 class="text-2xl font-bold text-white mb-2">Lumina Vault</h1>
            <p class="text-sm text-slate-400 mb-6">Acceso restringido. Por favor, identifícate.</p>
            
            <input type="password" id="passInput" placeholder="Contraseña de Administrador" class="w-full input-dark rounded-lg p-3 text-center tracking-widest mb-4" onkeypress="if(event.key === 'Enter') intentarLogin()">
            
            <div class="flex items-center justify-center mb-6 text-slate-400 text-sm">
                <input type="checkbox" id="rememberMe" class="mr-2 w-4 h-4 rounded border-slate-600 bg-slate-800 accent-blue-500 cursor-pointer">
                <label for="rememberMe" class="cursor-pointer hover:text-white transition-colors">Mantener sesión iniciada</label>
            </div>
            
            <button onclick="intentarLogin()" id="btnLogin" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition-all flex justify-center items-center gap-2">
                <i class="fas fa-lock-open"></i> Desbloquear Bóveda
            </button>
        </div>
    </div>

    <div id="panel-principal" class="hidden flex-col flex-1">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8 shrink-0">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold text-white tracking-wide flex items-center gap-3">
                    <i class="fas fa-cube text-blue-500"></i> Lumina Vault <span class="text-slate-500 font-light text-base sm:text-lg ml-1 sm:ml-2">Dev Workspace</span>
                </h1>
                <p class="text-xs sm:text-sm text-slate-400 mt-1">Gestor personal de sistemas y código fuente.</p>
            </div>
            
            <div class="flex gap-2 w-full sm:w-auto mt-2 sm:mt-0">
                <button onclick="cargarDashboard()" class="flex-1 sm:flex-none bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-3 sm:py-2 rounded-lg transition-colors flex justify-center items-center gap-2">
                    <i class="fas fa-sync-alt"></i> Refrescar
                </button>
                <button onclick="cerrarSesion()" class="flex-1 sm:flex-none bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 text-red-400 px-4 py-3 sm:py-2 rounded-lg transition-colors flex justify-center items-center gap-2" title="Cerrar Sesión">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </button>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-6 flex-1">
            <div class="glass-panel rounded-xl flex flex-col w-full lg:w-1/3 min-h-[400px] lg:h-[calc(100vh-160px)]">
                <div class="p-4 border-b border-slate-700/50 bg-slate-800/30 flex justify-between items-center shrink-0">
                    <h2 class="font-bold text-white text-sm sm:text-base"><i class="fas fa-list-ul mr-2 text-blue-400"></i> Sistemas Guardados</h2>
                    <span id="contador-sistemas" class="bg-blue-500/20 text-blue-400 text-xs px-2 py-1 rounded font-bold">0</span>
                </div>
                <div id="lista-sistemas" class="p-4 overflow-y-auto flex-1 space-y-3"></div>
            </div>

            <div class="glass-panel rounded-xl flex flex-col w-full lg:w-2/3 min-h-[600px] lg:h-[calc(100vh-160px)]">
                <div class="p-4 border-b border-slate-700/50 bg-slate-800/30 shrink-0">
                    <h2 id="titulo-editor" class="font-bold text-white text-base sm:text-lg"><i class="fas fa-plus-circle mr-2 text-emerald-400"></i> Integrar Nuevo Sistema</h2>
                </div>

                <div class="p-4 sm:p-6 flex-1 overflow-y-auto flex flex-col space-y-5">
                    <input type="hidden" id="editId" value="">

                    <div class="flex flex-col sm:flex-row gap-4 sm:gap-5">
                        <div class="flex-1">
                            <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Nombre / Etiqueta</label>
                            <input type="text" id="nombre" placeholder="Ej: Gestor Lumina" class="w-full input-dark rounded-lg p-3 text-sm">
                        </div>
                        <div class="flex-1">
                            <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">URL Personalizada (Opcional)</label>
                            <div class="flex">
                                <span class="bg-slate-800 border border-slate-700 border-r-0 rounded-l p-3 text-slate-500 text-sm">?id=</span>
                                <input type="text" id="idPersonalizado" placeholder="mi-sistema" class="w-full input-dark rounded-r p-3 text-sm font-mono">
                            </div>
                        </div>
                    </div>

                    <div class="flex-1 flex flex-col min-h-[250px]">
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-2 flex justify-between">
                            <span>Código Fuente (HTML/JS)</span>
                            <button onclick="limpiarEditor()" class="text-slate-500 hover:text-red-400 transition-colors"><i class="fas fa-eraser"></i> Limpiar</button>
                        </label>
                        <textarea id="htmlCode" placeholder="<!DOCTYPE html>..." class="w-full flex-1 input-dark rounded-lg p-4 text-sm font-mono resize-none min-h-[200px]"></textarea>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-3 pt-2 shrink-0">
                        <button onclick="cancelarEdicion()" id="btnCancelar" class="hidden w-full sm:w-1/3 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-6 rounded-lg transition-all">
                            Cancelar
                        </button>
                        <button onclick="guardarSistema()" id="btnGuardar" class="w-full flex-1 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition-all flex justify-center items-center gap-2">
                            <i class="fas fa-cloud-upload-alt"></i> Guardar en Bóveda
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const URL_API = "https://script.google.com/macros/s/AKfycbz2I7AgUS8aaqoxjPnQ8AH4cH7WWYKZAjqtPo7xoK7D7AGcFEB9T7JEWWJo5q1gWBErQA/exec";
        const TU_GITHUB_PAGES = "https://yumi-dev-workspace.github.io/lumina-vault/";
        
        let sistemasGlobal = []; 
        let toastTimeout;
        let tokenSesion = ""; 

        // Auto-Login: Verifica si marcaste "Recuérdame" anteriormente
        window.onload = () => {
            const tokenGuardado = localStorage.getItem('lumina_vault_token');
            if(tokenGuardado) {
                document.getElementById('passInput').value = tokenGuardado;
                intentarLogin(true); // El true indica que es un inicio de sesión automático
            }
        };

        function mostrarToast(mensaje, tipo = 'success') {
            const toast = document.getElementById('toast');
            clearTimeout(toastTimeout);
            let bgClass = tipo === 'success' ? 'bg-emerald-600' : (tipo === 'info' ? 'bg-blue-600' : 'bg-red-600');
            let iconClass = tipo === 'success' ? 'fa-check-circle' : (tipo === 'info' ? 'fa-info-circle' : 'fa-exclamation-triangle');
            
            toast.className = `fixed bottom-5 left-1/2 transform -translate-x-1/2 w-[90%] md:w-auto md:left-auto md:right-5 md:translate-x-0 px-6 py-4 rounded-lg shadow-2xl text-white font-bold transition-all duration-300 z-50 flex items-center gap-3 translate-y-0 opacity-100 ${bgClass}`;
            toast.innerHTML = `<i class="fas ${iconClass} text-xl shrink-0"></i> <span class="text-sm sm:text-base">${mensaje}</span>`;

            toastTimeout = setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        function intentarLogin(esAutoLogin = false) {
            const pass = document.getElementById('passInput').value;
            const btn = document.getElementById('btnLogin');
            const mantenerSesion = document.getElementById('rememberMe').checked;
            
            if(!pass) return mostrarToast("Ingresa una contraseña", "error");
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando...';
            
            const datos = new URLSearchParams();
            datos.append('adminPass', pass);
            datos.append('accion', 'dashboard');

            fetch(URL_API, { method: 'POST', body: datos })
            .then(res => res.json())
            .then(data => {
                if(data.error) {
                    if(!esAutoLogin) mostrarToast("Acceso Denegado: Contraseña incorrecta", "error");
                    btn.innerHTML = '<i class="fas fa-lock-open"></i> Desbloquear Bóveda';
                    document.getElementById('passInput').value = '';
                    localStorage.removeItem('lumina_vault_token'); // Borra memoria si la contraseña ya no sirve
                } else {
                    tokenSesion = pass;
                    
                    // Si el usuario marcó la casilla, guarda la contraseña en el navegador
                    if(mantenerSesion && !esAutoLogin) {
                        localStorage.setItem('lumina_vault_token', pass);
                    }

                    document.getElementById('pantalla-login').classList.add('hidden');
                    document.getElementById('panel-principal').classList.remove('hidden');
                    document.getElementById('panel-principal').classList.add('flex');
                    if(!esAutoLogin) mostrarToast("¡Bienvenido a Lumina Vault!", "success");
                    renderizarLista(data.sistemas || []);
                }
            }).catch(() => {
                mostrarToast('Error de red. Revisa tu conexión.', 'error');
                btn.innerHTML = '<i class="fas fa-lock-open"></i> Desbloquear Bóveda';
            });
        }

        // --- SISTEMA PARA CERRAR SESIÓN ---
        function cerrarSesion() {
            localStorage.removeItem('lumina_vault_token');
            location.reload(); // Recarga la página para mostrar el login de nuevo
        }

        function cargarDashboard() {
            const datos = new URLSearchParams();
            datos.append('adminPass', tokenSesion);
            datos.append('accion', 'dashboard');

            fetch(URL_API, { method: 'POST', body: datos })
            .then(res => res.json())
            .then(data => {
                if(!data.error) renderizarLista(data.sistemas || []);
            });
        }

        function renderizarLista(sistemas) {
            sistemasGlobal = sistemas; 
            document.getElementById('contador-sistemas').innerText = sistemasGlobal.length;
            const contenedor = document.getElementById('lista-sistemas');
            contenedor.innerHTML = '';
            
            if(sistemasGlobal.length === 0) {
                contenedor.innerHTML = '<p class="text-slate-500 text-sm text-center mt-10">La bóveda está vacía.</p>';
            } else {
                sistemasGlobal.forEach(sis => {
                    const link = TU_GITHUB_PAGES + "?id=" + sis.id;
                    contenedor.innerHTML += `
                        <div class="bg-slate-900/50 border border-slate-700/50 p-3 sm:p-4 rounded-lg hover:border-blue-500/30 transition-all">
                            <div class="flex justify-between items-start mb-3">
                                <div class="overflow-hidden pr-2">
                                    <h3 class="font-bold text-white text-sm sm:text-base truncate">${sis.nombre}</h3>
                                    <p class="text-[10px] sm:text-xs text-blue-400 font-mono mt-1 truncate">?id=${sis.id}</p>
                                </div>
                                <span class="text-[9px] sm:text-[10px] text-slate-500 shrink-0 bg-slate-800 px-2 py-1 rounded">${sis.fecha}</span>
                            </div>
                            <div class="grid grid-cols-4 gap-1 sm:gap-2">
                                <button onclick="window.open('${link}', '_blank')" class="bg-slate-700 hover:bg-emerald-600 text-white text-xs py-2 rounded transition-colors" title="Ver en vivo">
                                    <i class="fas fa-external-link-alt"></i>
                                </button>
                                <button onclick="copiarDirecto('${link}')" class="bg-slate-700 hover:bg-blue-600 text-white text-xs py-2 rounded transition-colors" title="Copiar Enlace">
                                    <i class="fas fa-copy"></i>
                                </button>
                                <button onclick="prepararEdicion('${sis.id}')" class="bg-slate-700 hover:bg-orange-500 text-white text-xs py-2 rounded transition-colors" title="Editar">
                                    <i class="fas fa-pen"></i>
                                </button>
                                <button onclick="eliminarSistema('${sis.id}', '${sis.nombre}')" class="bg-slate-700 hover:bg-red-600 text-white text-xs py-2 rounded transition-colors" title="Eliminar">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });
            }
        }

        function prepararEdicion(id) {
            const sistema = sistemasGlobal.find(s => s.id === id);
            if(!sistema) return;

            document.getElementById('editId').value = id;
            document.getElementById('nombre').value = sistema.nombre;
            document.getElementById('idPersonalizado').value = sistema.id;
            document.getElementById('idPersonalizado').disabled = true; 
            document.getElementById('idPersonalizado').classList.add('opacity-50');
            document.getElementById('htmlCode').value = sistema.codigo;
            
            document.getElementById('titulo-editor').innerHTML = `<i class="fas fa-pen mr-2 text-orange-400"></i> Editando: ${sistema.nombre}`;
            const btn = document.getElementById('btnGuardar');
            btn.innerHTML = '<i class="fas fa-save"></i> Actualizar Código';
            btn.className = "w-full flex-1 bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition-all flex justify-center items-center gap-2";
            
            document.getElementById('btnCancelar').classList.remove('hidden');
            mostrarToast('Cargado en el editor', 'info');
            
            if(window.innerWidth < 1024) document.getElementById('titulo-editor').scrollIntoView({ behavior: 'smooth' });
        }

        function cancelarEdicion() {
            limpiarEditor();
            document.getElementById('titulo-editor').innerHTML = `<i class="fas fa-plus-circle mr-2 text-emerald-400"></i> Integrar Nuevo Sistema`;
            const btn = document.getElementById('btnGuardar');
            btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Guardar en Bóveda';
            btn.className = "w-full flex-1 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition-all flex justify-center items-center gap-2";
            document.getElementById('btnCancelar').classList.add('hidden');
        }

        function limpiarEditor() {
            document.getElementById('editId').value = '';
            document.getElementById('nombre').value = '';
            document.getElementById('idPersonalizado').value = '';
            document.getElementById('idPersonalizado').disabled = false;
            document.getElementById('idPersonalizado').classList.remove('opacity-50');
            document.getElementById('htmlCode').value = '';
        }

        function guardarSistema() {
            const idEdicion = document.getElementById('editId').value;
            const nombre = document.getElementById('nombre').value;
            const codigo = document.getElementById('htmlCode').value;
            const idPersonalizado = document.getElementById('idPersonalizado').value;
            const btn = document.getElementById('btnGuardar');
            
            if(!nombre || !codigo) return mostrarToast("Asigna un nombre y pega el código HTML.", "error");

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';
            
            const datos = new URLSearchParams();
            datos.append('adminPass', tokenSesion);
            datos.append('accion', idEdicion ? 'editar' : 'guardar');
            if(idEdicion) datos.append('idEdicion', idEdicion);
            datos.append('nombreSistema', nombre);
            datos.append('codigoHtml', codigo);
            if(!idEdicion) datos.append('idPersonalizado', idPersonalizado);

            fetch(URL_API, { method: 'POST', body: datos })
            .then(res => res.json())
            .then(data => {
                if(data.error) return mostrarToast("Error de seguridad. Recarga la página.", "error");

                if(idEdicion) {
                    mostrarToast("Sistema actualizado exitosamente.", "success");
                } else {
                    mostrarToast("Nuevo sistema alojado en Lumina Vault.", "success");
                    copiarDirecto(TU_GITHUB_PAGES + "?id=" + data.id);
                }
                cancelarEdicion();
                cargarDashboard(); 
                
                if(window.innerWidth < 1024 && !idEdicion) window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        function eliminarSistema(id, nombre) {
            if(confirm(`⚠️ ALERTA: ¿Deseas eliminar permanentemente "${nombre}"? Esta acción borrará el código de Google Sheets.`)) {
                mostrarToast("Eliminando...", "info");
                
                const datos = new URLSearchParams();
                datos.append('adminPass', tokenSesion); 
                datos.append('accion', 'eliminar');
                datos.append('idEliminar', id);

                fetch(URL_API, { method: 'POST', body: datos })
                .then(res => res.json())
                .then(data => {
                    if(data.success) {
                        mostrarToast("Sistema purgado correctamente.", "success");
                        if(document.getElementById('editId').value === id) cancelarEdicion();
                        cargarDashboard();
                    } else {
                        mostrarToast("Error al intentar eliminar.", "error");
                    }
                });
            }
        }

        function copiarDirecto(texto) {
            navigator.clipboard.writeText(texto).then(() => mostrarToast("Enlace copiado.", "success"));
        }
    </script>
</body>
</html>
